<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTriage Report</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-graphviz@5.0.2/build/d3-graphviz.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #graph { width: 75%; height: 100vh; float: left; }
        #sidebar {
            width: 25%; height: 100vh; float: right;
            background: #f5f5f5; padding: 20px; box-sizing: border-box;
            overflow-y: auto; border-left: 1px solid #ddd;
        }
        .method { padding: 8px; margin: 4px 0; background: white; border-radius: 4px; }
        .external { color: #666; font-style: italic; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
<div id="graph"></div>
<div id="sidebar">
    <h3>CodeTriage</h3>
    <p>Click a node to see details</p>
</div>

<script>
    const dot = `{{DOT}}`;
    const fileInfo = {{FILE_INFO_JSON}};

    const fileMap = new Map(fileInfo.map(f => [f.className, f]));

    d3.select("#graph").graphviz()
        .fit(true)
        .zoom(true)
        .renderDot(dot);

    // Click handler
    d3.select("#graph").selectAll(".node").on("click", function(event) {
        const nodeName = this.querySelector("text").textContent.split("|")[0];
        const file = fileMap.get(nodeName);
        const sidebar = document.getElementById("sidebar");

        if (file) {
            sidebar.innerHTML = `
                <h3>${file.className}</h3>
                <p><strong>Package:</strong> ${file.packageName || "default"}</p>
                <p><strong>Path:</strong> ${file.path}</p>
                <h4>Methods:</h4>
                ${file.methods.map(m => `
                    <div class="method">${m.name}(${m.params}) → ${m.returnType}</div>
                `).join("")}
            `;
        } else {
            sidebar.innerHTML = `
                <h3>${nodeName}</h3>
                <p class="external">External dependency (not parsed)</p>
            `;
        }
    });
</script>
</body>
</html>
