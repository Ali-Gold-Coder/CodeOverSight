<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTriage Report - File Structure</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-graphviz@5.0.2/build/d3-graphviz.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #fafafa; 
        }
        
        #graph { 
            width: 100%; 
            height: 100vh; 
            background: white; 
        }
    </style>
</head>
<body>
<div id="graph"></div>
<script>
    const treeDot = `digraph CodeStructure {
  rankdir=TB;
  splines=ortho;
  nodesep=1;
  ranksep=2;
  node [shape=box, style="rounded,filled", fontname="Arial", fontsize=10];
  edge [color="#666", penwidth=1];

  "root" [label="📁 root", fillcolor="#2196F3"];
  "root" -> "src";
  "src" [label="📁 src", fillcolor="#2196F3"];
  "src" -> "main";
  "main" [label="📁 main", fillcolor="#2196F3"];
  "main" -> "java";
  "java" [label="📁 java", fillcolor="#2196F3"];
  "java" -> "com";
  "com" [label="📁 com", fillcolor="#2196F3"];
  "com" -> "codetriage";
  "codetriage" [label="📁 codetriage", fillcolor="#2196F3"];
  "codetriage" -> "cli";
  "cli" [label="📁 cli", fillcolor="#2196F3"];
  "cli" -> "ArgsParser_java";
  "ArgsParser_java" [label="📄 ArgsParser.java", fillcolor="#4CAF50"];
  "cli" -> "Config_java";
  "Config_java" [label="📄 Config.java", fillcolor="#4CAF50"];
  "codetriage" -> "CodeOverSight";
  "CodeOverSight" [label="📁 CodeOverSight", fillcolor="#2196F3"];
  "CodeOverSight" -> "CodeOverSight_java";
  "CodeOverSight_java" [label="📄 CodeOverSight.java", fillcolor="#4CAF50"];
  "codetriage" -> "CodeTriage_java";
  "CodeTriage_java" [label="📄 CodeTriage.java", fillcolor="#4CAF50"];
  "codetriage" -> "graph";
  "graph" [label="📁 graph", fillcolor="#2196F3"];
  "graph" -> "DotGenerator_java";
  "DotGenerator_java" [label="📄 DotGenerator.java", fillcolor="#4CAF50"];
  "codetriage" -> "model";
  "model" [label="📁 model", fillcolor="#2196F3"];
  "model" -> "ClassInfo_java";
  "ClassInfo_java" [label="📄 ClassInfo.java", fillcolor="#4CAF50"];
  "model" -> "FileInfo_java";
  "FileInfo_java" [label="📄 FileInfo.java", fillcolor="#4CAF50"];
  "model" -> "MethodSig_java";
  "MethodSig_java" [label="📄 MethodSig.java", fillcolor="#4CAF50"];
  "model" -> "TreeNode_java";
  "TreeNode_java" [label="📄 TreeNode.java", fillcolor="#4CAF50"];
  "codetriage" -> "parser";
  "parser" [label="📁 parser", fillcolor="#2196F3"];
  "parser" -> "FileParser_java";
  "FileParser_java" [label="📄 FileParser.java", fillcolor="#4CAF50"];
  "codetriage" -> "render";
  "render" [label="📁 render", fillcolor="#2196F3"];
  "render" -> "HtmlRenderer_java";
  "HtmlRenderer_java" [label="📄 HtmlRenderer.java", fillcolor="#4CAF50"];
  "render" -> "TreeRenderer_java";
  "TreeRenderer_java" [label="📄 TreeRenderer.java", fillcolor="#4CAF50"];
  "codetriage" -> "util";
  "util" [label="📁 util", fillcolor="#2196F3"];
  "util" -> "FileLister_java";
  "FileLister_java" [label="📄 FileLister.java", fillcolor="#4CAF50"];
  "util" -> "TreeBuilder_java";
  "TreeBuilder_java" [label="📄 TreeBuilder.java", fillcolor="#4CAF50"];
  "java" -> "org";
  "org" [label="📁 org", fillcolor="#2196F3"];
  "org" -> "example";
  "example" [label="📁 example", fillcolor="#2196F3"];
  "example" -> "App_java";
  "App_java" [label="📄 App.java", fillcolor="#4CAF50"];
}
`;
    
    d3.select("#graph").graphviz()
        .fit(true)
        .zoom(true)
        .renderDot(treeDot);
</script>
</body>
</html>
