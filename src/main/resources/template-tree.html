<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTriage Report - File Structure</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #fafafa; 
            padding: 20px;
        }
        
        #tree-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        
        #tree-view {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .tree-node { 
            margin: 4px 0; 
            padding: 6px; 
            border-radius: 4px; 
            transition: 0.2s; 
        }
        .tree-node:hover { 
            background: #f5f5f5; 
            padding-left: 12px; 
        }
        .tree-icon { 
            margin-right: 8px; 
            display: inline-block; 
            width: 16px; 
        }
        .tree-details { 
            cursor: pointer; 
            user-select: none; 
        }
        .tree-details[open] > .tree-summary .tree-icon::before { 
            content: '▼ '; 
        }
        .tree-details:not([open]) > .tree-summary .tree-icon::before { 
            content: '▶ '; 
        }
        .tree-summary { 
            list-style: none; 
            cursor: pointer; 
            padding: 4px 0; 
            font-weight: 500; 
        }
        .tree-summary::-webkit-details-marker { 
            display: none; 
        }
        .modifier-badge { 
            display: inline-block; 
            padding: 2px 6px; 
            background: #f0f0f0; 
            border-radius: 3px; 
            font-size: 11px; 
            font-weight: 600; 
            color: #666; 
            margin-left: 6px; 
        }
        .method-signature { 
            display: inline-block; 
            padding: 2px 6px; 
            background: #e3f2fd; 
            border-radius: 3px; 
            font-size: 11px; 
            color: #1565c0; 
            margin-left: 6px; 
        }
        .tree-folder { 
            font-weight: 600; 
            color: #2196F3; 
        }
        .tree-file { 
            font-weight: 500; 
            color: #4CAF50; 
        }
        .tree-class { 
            font-weight: 600; 
            color: #FF9800; 
        }
        .tree-method { 
            font-style: italic; 
            color: #666; 
        }
        .tree-import { 
            color: #999; 
            font-size: 12px; 
        }
    </style>
</head>
<body>
<div id="tree-container">
    <h1>📁 Code Structure Tree</h1>
    <div id="tree-view">{{TREE_VIEW}}</div>
</div>
</body>
</html>
